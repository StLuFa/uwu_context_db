[graph]
all-features = true

[advisories]
version = 2
ignore = []

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/StLuFa/uwu-crdt.git",
    "https://github.com/StLuFa/uwu_database.git",
    "https://github.com/StLuFa/uwu_event_mesh.git",
    "https://github.com/StLuFa/uwu_nats_bridge.git",
    "https://github.com/StLuFa/uwu_visual_script.git",
]
